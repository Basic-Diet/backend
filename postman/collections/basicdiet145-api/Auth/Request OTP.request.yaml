$kind: http-request
name: Request OTP
method: POST
url: '{{baseUrl}}/auth/otp/request'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "phoneE164": "{{testPhone}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function() {
        pm.response.to.have.status(200);
      });
      pm.test("Response has ok or status true", function() {
        const json = pm.response.json();
        pm.expect(json.ok === true || json.status === true).to.be.true;
      });
