$kind: http-request
name: Forgot Password
method: POST
url: '{{baseUrl}}/auth/password/forgot'
order: 10000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "phoneE164": "{{testPhone}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 429", function() {
        pm.expect([200, 429]).to.include(pm.response.code);
      });
