$kind: http-request
name: Verify OTP
method: POST
url: '{{baseUrl}}/auth/otp/verify'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "phoneE164": "{{testPhone}}",
      "otp": "{{testOtp}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function() {
        pm.response.to.have.status(200);
      });
      const r = pm.response.json();
      if (r.data && r.data.accessToken) {
        pm.environment.set('accessToken', r.data.accessToken);
        pm.environment.set('refreshToken', r.data.refreshToken);
      }
      pm.test("Response has tokens", function() {
        pm.expect(r.data).to.have.property('accessToken');
      });
