$kind: http-request
name: GET Categories with Meals
method: GET
url: '{{baseUrl}}/categories-with-meals'
order: 2000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function() {
        pm.response.to.have.status(200);
      });
      pm.test("Response is array or has data", function() {
        const json = pm.response.json();
        pm.expect(Array.isArray(json) || json.data !== undefined).to.be.true;
      });
