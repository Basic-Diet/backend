name: Apply premium backend repairs

on:
  push:
    branches:
      - "test/premium-meal-backend-lifecycle"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: test/premium-meal-backend-lifecycle
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply repairs
        run: node scripts/apply-premium-backend-repairs.js
      - name: Validate syntax
        run: |
          node --check src/services/subscription/subscriptionActivationService.js
          node --check src/services/subscription/subscriptionMenuEligibilityPolicyService.js
          node --check src/middleware/filterAddonChoicesAvailability.js
          node --check src/services/orders/menuPricingService.js
          node --check tests/addon_balance_e2e.test.js
          node --check tests/checkout.integration.test.js
          node --check tests/mealPlanner.integration.test.js
          node --check tests/oneTimeMenuCatalog.test.js
      - name: Commit and attempt publication
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/middleware/filterAddonChoicesAvailability.js \
            src/services/orders/menuPricingService.js \
            src/services/subscription/subscriptionActivationService.js \
            src/services/subscription/subscriptionMenuEligibilityPolicyService.js \
            tests/addon_balance_e2e.test.js \
            tests/checkout.integration.test.js \
            tests/mealPlanner.integration.test.js \
            tests/oneTimeMenuCatalog.test.js
          git status --short > repair-publication.log
          git commit -m "fix(backend): repair premium and add-on lifecycles" >> repair-publication.log 2>&1
          git push origin HEAD:test/premium-meal-backend-lifecycle >> repair-publication.log 2>&1 || true
          cat repair-publication.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repair-publication-log
          path: repair-publication.log
          retention-days: 1
