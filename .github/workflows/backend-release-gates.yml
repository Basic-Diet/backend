name: Backend release gates

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - "agent/**"
      - "test/**"

permissions:
  contents: read

jobs:
  contracts-and-addon-lifecycle:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit baseline
        run: npm test

      - name: Add-on allocation policies
        run: npm run test:addon-credit-allocation

      - name: Add-on dashboard and mobile parity
        run: npm run test:addon-dashboard-mobile-parity

      - name: Add-on activation, balance, save, and confirmation lifecycle
        run: npm run test:addon-credit-lifecycle

      - name: Catalog and validator consistency
        run: npm run test:catalog-validator-consistency

      - name: Dashboard and mobile menu parity
        run: npm run test:menu-dashboard-mobile-parity

      - name: Meal Builder parity
        run: npm run test:meal-builder-dashboard-mobile-parity

      - name: Premium salad eligibility
        run: npm run test:premium-salad-eligibility

      - name: Mobile contracts
        run: npm run test:mobile-contracts
