name: Temporary export backend failures

on:
  pull_request:
    branches:
      - main

jobs:
  diagnose:
    if: github.head_ref == 'agent/fix-backend-contract-tests'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-backend-contract-tests
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Capture integration failures
        shell: bash
        run: |
          set +e
          npm run test:integration > /tmp/integration.log 2>&1
          echo $? > /tmp/integration.exit
          grep -E "❌|RESULTS:|AssertionError|Error:|failed" /tmp/integration.log | tail -200 > /tmp/failures.txt || true
          cat /tmp/failures.txt
      - uses: actions/upload-artifact@v4
        with:
          name: backend-contract-failures
          path: /tmp/failures.txt
      - name: Preserve integration result
        shell: bash
        run: exit "$(cat /tmp/integration.exit)"
