name: Temporary apply final Meal Planner fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    if: github.head_ref == 'agent/fix-backend-contract-tests'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NODE_ENV: test
      USE_MONGODB_MEMORY_REPLSET: "true"
      JWT_SECRET: supersecret
      DASHBOARD_JWT_SECRET: dashboard-test-secret
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-backend-contract-tests
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run integration
        shell: bash
        run: |
          set +e
          npm run test:integration > /tmp/integration.log 2>&1
          code=$?
          grep -n -B 8 -A 24 "❌" /tmp/integration.log > /tmp/failures.txt || true
          tail -80 /tmp/integration.log >> /tmp/failures.txt
          echo "$code" > /tmp/exit-code.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: final-meal-planner-failures
          path: |
            /tmp/failures.txt
            /tmp/exit-code.txt
      - name: Preserve result
        shell: bash
        run: exit "$(cat /tmp/exit-code.txt)"
