name: Temporary apply final Meal Planner fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    if: github.head_ref == 'agent/fix-backend-contract-tests'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NODE_ENV: test
      USE_MONGODB_MEMORY_REPLSET: "true"
      JWT_SECRET: supersecret
      DASHBOARD_JWT_SECRET: dashboard-test-secret
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-backend-contract-tests
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run integration and print failures
        shell: bash
        run: |
          set +e
          npm run test:integration > /tmp/integration.log 2>&1
          code=$?
          grep -n -B 6 -A 18 "❌" /tmp/integration.log || true
          tail -60 /tmp/integration.log
          exit "$code"
