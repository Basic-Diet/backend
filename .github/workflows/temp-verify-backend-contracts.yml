name: Temporary verify backend contracts

on:
  pull_request:
    branches:
      - main

jobs:
  verify:
    if: github.head_ref == 'agent/fix-backend-contract-tests'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NODE_ENV: test
      USE_MONGODB_MEMORY_REPLSET: "true"
      JWT_SECRET: supersecret
      DASHBOARD_JWT_SECRET: dashboard-test-secret
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-backend-contract-tests
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run requested backend checks
        shell: bash
        run: |
          set +e
          : > /tmp/results.txt
          for command in \
            "npm run test:integration" \
            "npm run validate:backend" \
            "npm run test:meal-builder-dashboard-mobile-parity" \
            "npm run test:mobile-contracts"
          do
            echo "=== $command ===" | tee -a /tmp/results.txt
            bash -lc "$command" > /tmp/current.log 2>&1
            code=$?
            grep -E "❌|RESULTS:|AssertionError|Error:|failed|passed|Exit code" /tmp/current.log | tail -250 | tee -a /tmp/results.txt || true
            echo "EXIT_CODE=$code" | tee -a /tmp/results.txt
            if [ "$code" -ne 0 ]; then overall=1; fi
          done
          echo "${overall:-0}" > /tmp/overall.exit
      - uses: actions/upload-artifact@v4
        with:
          name: backend-contract-verification
          path: /tmp/results.txt
      - name: Preserve verification result
        shell: bash
        run: exit "$(cat /tmp/overall.exit)"
